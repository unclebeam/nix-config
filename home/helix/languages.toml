# Language-specific settings — plain file, symlinked by home/helix.nix.
# The LSP/formatter binaries come from home/helix.nix (Nix packages, no Mason).
# nil (the Nix LSP) needs no entry — helix uses it for .nix files by default.

[[language]]
name = "nix"
formatter = { command = "nixfmt" }
auto-format = true

# ─── TypeScript / React / Node stack (see home/helix.nix for the packages) ───
# Servers are declared explicitly so this config does not depend on helix's
# internal default names. prettierd formats every language below: it forwards
# to the project's own prettier (+ plugins), using the representative filename
# in `args` only to pick the parser — it resolves the real config from the cwd.

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[language-server.vscode-eslint-language-server]
command = "vscode-eslint-language-server"
args = ["--stdio"]
# Monorepo: resolve each package's own eslint.config.mjs (flat config, ESLint 9).
[language-server.vscode-eslint-language-server.config]
validate = "on"
experimental = { useFlatConfig = true }
workingDirectories = [{ mode = "auto" }]

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[language-server.emmet-language-server]
command = "emmet-language-server"
args = ["--stdio"]

[language-server.prisma-language-server]
command = "prisma-language-server"
args = ["--stdio"]

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "vscode-eslint-language-server"]
formatter = { command = "prettierd", args = ["file.ts"] }
auto-format = true

[[language]]
name = "tsx"
language-servers = ["typescript-language-server", "vscode-eslint-language-server", "tailwindcss-ls", "emmet-language-server"]
formatter = { command = "prettierd", args = ["file.tsx"] }
auto-format = true

[[language]]
name = "jsx"
language-servers = ["typescript-language-server", "vscode-eslint-language-server", "tailwindcss-ls", "emmet-language-server"]
formatter = { command = "prettierd", args = ["file.jsx"] }
auto-format = true

[[language]]
name = "javascript"
language-servers = ["typescript-language-server", "vscode-eslint-language-server"]
formatter = { command = "prettierd", args = ["file.js"] }
auto-format = true

[[language]]
name = "json"
formatter = { command = "prettierd", args = ["file.json"] }
auto-format = true

[[language]]
name = "css"
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]
formatter = { command = "prettierd", args = ["file.css"] }
auto-format = true

[[language]]
name = "prisma"
language-servers = ["prisma-language-server"]
