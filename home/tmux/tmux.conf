# home/tmux/tmux.conf — plain tmux config, symlinked by home/tmux.nix.
# Deliberately minimal: only what nvim needs to work well under tmux, plus
# the vim-tmux-navigator bindings. Status bar stays stock (restrained look).

# ── Terminal / nvim essentials ──────────────────────────────────────────
# Inside tmux, $TERM must be a tmux-* entry (screen-* breaks italics and
# some keys in nvim). tmux-256color ships with ncurses on NixOS.
set -g default-terminal "tmux-256color"
# Tell tmux the OUTER terminal (alacritty) supports 24-bit color, so nvim
# truecolor themes render identically inside and outside tmux.
set -as terminal-features ",alacritty:RGB"

# tmux waits after ESC to see if it starts an escape sequence; the 500ms
# default makes leaving insert mode in nvim feel laggy. 10ms is safe on a
# local terminal.
set -s escape-time 10

# Forward the terminal's focus events to programs inside tmux — nvim needs
# them for FocusGained/FocusLost (autoread, cursorline toggles, etc.).
set -g focus-events on

# Click to select panes, drag borders to resize, wheel to scroll history.
set -g mouse on

# ── vim-tmux-navigator (tmux side) ──────────────────────────────────────
# Canonical snippet from github.com/christoomey/vim-tmux-navigator — must
# stay in sync with the nvim half in home/nvim/lua/plugins/tmux-navigator.lua.
# Ctrl+h/j/k/l selects the pane in that direction, UNLESS the current pane
# runs vim/nvim, in which case the key is passed through and the nvim plugin
# moves between splits (and hops back into tmux at the edge).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Same navigation keys inside copy mode.
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# The navigator steals bare Ctrl+l (normally "clear screen" in the shell);
# prefix + Ctrl+l gets it back.
bind C-l send-keys 'C-l'
